<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automata Miner Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tmi.js/tmi.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #9146FF; border-radius: 10px; }
        .chat-msg { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <nav class="bg-gray-800 border-b border-[#9146FF] px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">Miner <span class="text-[#9146FF]">Dashboard</span></h1>
        <a href="/logout" class="bg-red-600 px-4 py-2 rounded-lg text-sm font-bold">Kilépés</a>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for acc in accounts %}
            <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 relative">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-lg font-bold">{{ acc.channel_name }}</h3>
                    {% if acc.is_online %}
                        <span class="bg-red-500 text-[10px] font-bold px-2 py-0.5 rounded-full animate-pulse uppercase">Live</span>
                    {% endif %}
                </div>
                <div class="text-2xl font-black text-green-400 mb-4">{{ acc.formatted_points }} <span class="text-xs text-gray-500 uppercase">Pont</span></div>
                
                {% if acc.is_online %}
                    <button onclick="openAutomatedChat('{{ acc.channel_name }}')" class="w-full bg-[#9146FF] hover:bg-[#772ce8] py-2 rounded-lg font-bold transition">Automata Chat</button>
                {% else %}
                    <button disabled class="w-full bg-gray-700 text-gray-500 py-2 rounded-lg font-bold cursor-not-allowed">Offline</button>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </main>

    <div id="chatModal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 rounded-xl w-full max-w-lg h-[80vh] flex flex-col border border-[#9146FF] overflow-hidden">
            <div class="bg-gray-900 p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 id="chatTitle" class="font-bold text-[#9146FF]">Chat</h3>
                <button onclick="closeChat()" class="text-gray-400 hover:text-white font-bold text-2xl">&times;</button>
            </div>
            
            <div id="chatBox" class="flex-grow p-4 overflow-y-auto space-y-2 text-sm bg-black/50">
                <p class="text-gray-500 italic">Csatlakozás a szerverhez...</p>
            </div>

            <div class="p-4 bg-gray-900 border-t border-gray-700">
                <div class="flex gap-2">
                    <input type="text" id="messageInput" placeholder="Üzenet küldése..." class="flex-grow bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-[#9146FF]">
                    <button onclick="sendMessage()" class="bg-[#9146FF] px-4 py-2 rounded-lg font-bold">Küldés</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let client;
        let currentChannel = "";
        
        // Ezeket az adatokat az app.py küldte be titokban
        const twitchUser = "{{ twitch_name }}";
        const twitchToken = "{{ twitch_token }}";

        async function openAutomatedChat(channel) {
            currentChannel = channel;
            document.getElementById('chatTitle').innerText = channel + " - Automata Chat";
            document.getElementById('chatBox').innerHTML = "";
            document.getElementById('chatModal').classList.remove('hidden');

            // Ha már van futó kliens, leállítjuk
            if (client) { await client.disconnect(); }

            // Új csatlakozás a megadott csatornához
            client = new tmi.Client({
                options: { debug: false },
                identity: { username: twitchUser, password: twitchToken },
                channels: [ channel ]
            });

            client.connect();

            client.on('message', (channel, tags, message, self) => {
                const chatBox = document.getElementById('chatBox');
                const div = document.createElement('div');
                div.className = "chat-msg border-l-2 border-gray-700 pl-2 py-1";
                div.innerHTML = `<span style="color: ${tags.color || '#9146FF'}" class="font-bold">${tags['display-name']}</span>: <span class="text-gray-200">${message}</span>`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value;
            if (msg && client && currentChannel) {
                client.say(currentChannel, msg);
                input.value = "";
            }
        }

        // Enter gombra küldés
        document.getElementById('messageInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        function closeChat() {
            document.getElementById('chatModal').classList.add('hidden');
            if (client) client.disconnect();
        }
    </script>
</body>
</html>
